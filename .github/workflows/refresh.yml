name: Refresh FX Data
permissions:
  contents: write        # ← ADD THIS — allows the workflow to push commits

on:
  schedule:
    - cron: '0 6 * * *'   # ← daily at 6am UTC (see point 3)
  workflow_dispatch:          # Also allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Run refresh script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node refresh.js

      - name: Commit updated data
        run: |
          git config user.name "fx-bot"
          git config user.email "bot@fx-dashboard"
          git add index.html
          git diff --staged --quiet || git commit -m "refresh: FX data $(date +'%Y-%m-%d')"
          git push
