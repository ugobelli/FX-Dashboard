<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FX Rate Monitor</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f8fafc; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ── DATA (updated by refresh.js on every run) ──────────────────
    const FX_DATA = {
          "lastUpdated": "07 Jul 2026",
          "pairs": [
                {
                      "pair": "USD/EGP",
                      "flag": "🇪🇬",
                      "name": "Egyptian Pound",
                      "spotRate": 49.13,
                      "change7d": "-0.8%",
                      "trend7d": "depreciation",
                      "change30d": "-5.2%",
                      "trend30d": "depreciation",
                      "outlook6m": "stable",
                      "inflationRate": "14.6%",
                      "inflationNote": "May 2026 YoY — easing from 14.9% in April; transport inflation cooling but housing/utilities still elevated at 40%+",
                      "interestRate": "19.0%",
                      "interestNote": "CBE held rates at 19% in May 2026; paused easing cycle amid regional conflict and upside inflation risks to Q4 2026 target",
                      "realRate": "+4.4%",
                      "drivers": [
                            "IMF programme and remittance inflows supporting EGP stability",
                            "Fuel price hikes and elevated housing costs sustaining inflation",
                            "Regional conflict risk and global energy shock pressuring disinflation"
                      ],
                      "outlookNote": "The EGP is expected to remain broadly stable over 6 months, underpinned by strong remittances and IMF support, though CBE's 7% inflation target for Q4 2026 faces upside risks."
                },
                {
                      "pair": "USD/KZT",
                      "flag": "🇰🇿",
                      "name": "Kazakhstani Tenge",
                      "spotRate": 470.2,
                      "change7d": "-2.3%",
                      "trend7d": "depreciation",
                      "change30d": "-3.3%",
                      "trend30d": "depreciation",
                      "outlook6m": "stable",
                      "inflationRate": "10.4%",
                      "inflationNote": "May 2026 YoY — lowest since March 2025; food and services inflation easing on tight monetary policy and stronger tenge",
                      "interestRate": "17.0%",
                      "interestNote": "NBK cut 100bps to 17% in June 2026, its first reduction since mid-2024, surprising markets; revised 2026 inflation forecast to 9–11%",
                      "realRate": "+6.6%",
                      "drivers": [
                            "Oil revenue and commodity exports underpinning tenge strength",
                            "Disinflation trend allowing NBK to begin cautious easing cycle",
                            "VAT hike pass-through and global energy prices keeping inflation elevated"
                      ],
                      "outlookNote": "The KZT is likely to remain stable-to-gently-appreciating as disinflation continues and NBK proceeds with cautious rate cuts, though oil price volatility remains a downside risk."
                },
                {
                      "pair": "USD/UAH",
                      "flag": "🇺🇦",
                      "name": "Ukrainian Hryvnia",
                      "spotRate": 44.5,
                      "change7d": "+0.3%",
                      "trend7d": "appreciation",
                      "change30d": "+1.7%",
                      "trend30d": "appreciation",
                      "outlook6m": "depreciation",
                      "inflationRate": "8.2%",
                      "inflationNote": "May 2026 YoY — easing from 8.6% in April; fuel/transport inflation still elevated at ~20% YoY from Middle East oil shock",
                      "interestRate": "15.0%",
                      "interestNote": "NBU held at 15% since January 2026 cut from 15.5%; easing cycle paused as energy-driven inflation exceeded forecasts; rates to stay on hold to Q2 2027",
                      "realRate": "+6.8%",
                      "drivers": [
                            "Russia-Ukraine war destruction of energy infrastructure driving costs",
                            "Middle East oil shock amplifying fuel and transport price pressures",
                            "EU €90bn loan package and $55bn FX reserves supporting hryvnia"
                      ],
                      "outlookNote": "The UAH is expected to face gradual depreciation pressure over 6 months as war-related energy damage and inflation keep the NBU on hold, with managed flexibility limiting the downside."
                },
                {
                      "pair": "USD/MAD",
                      "flag": "🇲🇦",
                      "name": "Moroccan Dirham",
                      "spotRate": 9.3636,
                      "change7d": "-0.6%",
                      "trend7d": "depreciation",
                      "change30d": "+1.1%",
                      "trend30d": "appreciation",
                      "outlook6m": "stable",
                      "inflationRate": "1.2%",
                      "inflationNote": "May 2026 YoY — down from 1.7% YoY high; energy/fuel prices surged 27.6% YoY but broader inflation remains very contained",
                      "interestRate": "2.25%",
                      "interestNote": "Bank Al-Maghrib held at 2.25% for the fifth consecutive meeting in June 2026; rate expected to stay on hold through end-2026 amid imported inflation risks",
                      "realRate": "+1.05%",
                      "drivers": [
                            "MAD closely pegged to EUR/USD basket, tracking Euro strength",
                            "Strong 5.2% GDP growth forecast and buoyant agricultural output",
                            "Energy import costs and global oil prices threatening imported inflation"
                      ],
                      "outlookNote": "The MAD is expected to remain stable over 6 months given its managed peg, contained domestic inflation, and Morocco's robust growth outlook, though rising oil prices pose a modest upside inflation risk."
                },
                {
                      "pair": "USD/EUR",
                      "flag": "🇪🇺",
                      "name": "Euro",
                      "spotRate": 0.8745,
                      "change7d": "-0.4%",
                      "trend7d": "depreciation",
                      "change30d": "+1.5%",
                      "trend30d": "appreciation",
                      "outlook6m": "stable",
                      "inflationRate": "2.8%",
                      "inflationNote": "June 2026 YoY — slowing from 3.2% in May; below ECB's forecast peak as US-Iran peace talks ease energy pressure; core at 2.4%",
                      "interestRate": "2.40%",
                      "interestNote": "ECB hiked 25bps to 2.40% (MRO) in June 2026, its first hike since 2023, driven by energy-led inflation; one further hike priced in but now less certain",
                      "realRate": "-0.4%",
                      "drivers": [
                            "Weak US payrolls (+57k) driving dollar softness and EUR recovery",
                            "ECB June rate hike and energy inflation from Middle East conflict",
                            "Eurozone growth only 0.8% in 2026; stagflation fears capping EUR upside"
                      ],
                      "outlookNote": "USD/EUR is expected to remain range-bound near current levels over 6 months, with a modest USD-weakening bias as soft US labour data offsets ECB hawkishness and slowing Eurozone growth."
                }
          ]
    };

    // ── Components ─────────────────────────────────────────────────

    function TrafficLight({ trend, change }) {
      const cfg = {
        appreciation: { bg: "#fee2e2", color: "#dc2626", dot: "#dc2626", arrow: "↑" },
        depreciation: { bg: "#dcfce7", color: "#16a34a", dot: "#16a34a", arrow: "↓" },
        stable:       { bg: "#fef9c3", color: "#ca8a04", dot: "#ca8a04", arrow: "→" },
      }[trend] || { bg: "#f3f4f6", color: "#6b7280", dot: "#9ca3af", arrow: "?" };

      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:5, background:cfg.bg, color:cfg.color, borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>
          <span style={{ width:7, height:7, borderRadius:"50%", background:cfg.dot, flexShrink:0 }} />
          USD {cfg.arrow}{change ? ` ${change}` : ""}
        </span>
      );
    }

    function OutlookBadge({ outlook }) {
      const cfg = {
        appreciation: { bg:"#fef2f2", border:"#fecaca", color:"#b91c1c", icon:"🔴", label:"USD Strengthening" },
        depreciation: { bg:"#f0fdf4", border:"#bbf7d0", color:"#15803d", icon:"🟢", label:"USD Weakening" },
        stable:       { bg:"#fefce8", border:"#fde68a", color:"#b45309", icon:"🟡", label:"Broadly Stable" },
      }[outlook] || { bg:"#f3f4f6", border:"#e5e7eb", color:"#6b7280", icon:"⚪", label:"Unclear" };

      return (
        <span style={{ background:cfg.bg, border:`1px solid ${cfg.border}`, borderRadius:8, padding:"4px 10px", display:"inline-flex", alignItems:"center", gap:5, flexShrink:0 }}>
          <span>{cfg.icon}</span>
          <span style={{ fontSize:11, fontWeight:700, color:cfg.color }}>{cfg.label}</span>
        </span>
      );
    }

    function MacroRow({ label, value, note, accent }) {
      return (
        <div style={{ display:"flex", alignItems:"flex-start", gap:10, padding:"8px 0", borderBottom:"1px solid #f1f5f9" }}>
          <div style={{ minWidth:110 }}>
            <div style={{ fontSize:10, fontWeight:600, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.4 }}>{label}</div>
            <div style={{ fontSize:18, fontWeight:800, color:accent, letterSpacing:-0.5, marginTop:1 }}>{value}</div>
          </div>
          <div style={{ fontSize:11, color:"#64748b", lineHeight:1.5, paddingTop:2 }}>{note}</div>
        </div>
      );
    }

    function PairCard({ data }) {
      return (
        <div style={{ background:"#fff", border:"1px solid #e5e7eb", borderRadius:14, padding:"20px 22px", display:"flex", flexDirection:"column", gap:14, boxShadow:"0 1px 4px rgba(0,0,0,0.05)" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:26 }}>{data.flag}</span>
              <div>
                <div style={{ fontSize:16, fontWeight:800, color:"#0f172a", letterSpacing:-0.3 }}>{data.pair}</div>
                <div style={{ fontSize:11, color:"#94a3b8", marginTop:1 }}>{data.name}</div>
              </div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:22, fontWeight:800, color:"#0f172a" }}>{data.spotRate}</div>
              <div style={{ fontSize:11, color:"#94a3b8" }}>Spot · {FX_DATA.lastUpdated}</div>
            </div>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            {[
              { label:"7-Day",      trend:data.trend7d,   change:data.change7d  },
              { label:"30-Day",     trend:data.trend30d,  change:data.change30d },
              { label:"6M Outlook", trend:data.outlook6m, change:null           },
            ].map(({ label, trend, change }) => (
              <div key={label} style={{ background:"#f8fafc", borderRadius:10, padding:"10px 12px", display:"flex", flexDirection:"column", gap:6 }}>
                <div style={{ fontSize:10, fontWeight:600, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.4 }}>{label}</div>
                <TrafficLight trend={trend} change={change} />
              </div>
            ))}
          </div>

          <div style={{ background:"#f8fafc", borderRadius:10, padding:"4px 12px 0" }}>
            <MacroRow label="Inflation Rate" value={data.inflationRate} note={data.inflationNote} accent="#7c3aed" />
            <MacroRow label="Interest Rate"  value={data.interestRate}  note={data.interestNote}  accent="#0284c7" />
            <div style={{ display:"flex", justifyContent:"flex-end", alignItems:"center", gap:6, padding:"6px 0 8px" }}>
              <span style={{ fontSize:10, color:"#94a3b8", fontWeight:600 }}>REAL RATE</span>
              <span style={{
                fontSize:12, fontWeight:800, padding:"2px 8px", borderRadius:12,
                background: data.realRate.startsWith("-") ? "#fee2e2" : "#dcfce7",
                color:      data.realRate.startsWith("-") ? "#b91c1c" : "#15803d",
              }}>{data.realRate}</span>
            </div>
          </div>

          <div>
            <div style={{ fontSize:10, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.4, marginBottom:7 }}>Key Drivers</div>
            {data.drivers.map((d, i) => (
              <div key={i} style={{ display:"flex", gap:8, fontSize:12, color:"#374151", lineHeight:1.6, marginBottom:4 }}>
                <span style={{ color:"#6366f1", fontWeight:800, flexShrink:0 }}>·</span>
                <span>{d}</span>
              </div>
            ))}
          </div>

          <div style={{ borderTop:"1px solid #f1f5f9", paddingTop:12, display:"flex", alignItems:"flex-start", gap:10 }}>
            <OutlookBadge outlook={data.outlook6m} />
            <div style={{ fontSize:12, color:"#475569", lineHeight:1.5, paddingTop:2 }}>{data.outlookNote}</div>
          </div>
        </div>
      );
    }

    function App() {
      const [filter, setFilter] = useState("all");

      const filtered = FX_DATA.pairs.filter(d =>
        filter === "all"    ? true :
        filter === "red"    ? d.outlook6m === "appreciation" :
        filter === "green"  ? d.outlook6m === "depreciation" :
        d.outlook6m === "stable"
      );

      return (
        <div style={{ minHeight:"100vh", background:"#f8fafc" }}>
          <div style={{ background:"#0f172a", padding:"18px 24px 14px", position:"sticky", top:0, zIndex:10 }}>
            <div style={{ maxWidth:980, margin:"0 auto" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
                <div>
                  <div style={{ fontSize:18, fontWeight:800, color:"#fff", letterSpacing:-0.4 }}>FX Rate Monitor</div>
                  <div style={{ fontSize:11, color:"#475569", marginTop:2 }}>
                    Data sourced by Claude · {FX_DATA.lastUpdated} · TradingEconomics, ECB, NBU, CBE, NBK, BAM
                  </div>
                </div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  {[
                    { key:"all",    label:"All pairs" },
                    { key:"green",  label:"🟢 USD Weakening" },
                    { key:"red",    label:"🔴 USD Strengthening" },
                    { key:"stable", label:"🟡 Stable" },
                  ].map(({ key, label }) => (
                    <button key={key} onClick={() => setFilter(key)} style={{ background:filter===key?"#6366f1":"#1e293b", border:filter===key?"1px solid #818cf8":"1px solid #334155", borderRadius:8, color:filter===key?"#fff":"#94a3b8", padding:"6px 12px", fontSize:11, fontWeight:600, cursor:"pointer" }}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ marginTop:10, fontSize:11, color:"#64748b" }}>
                🟢 USD falling · 🔴 USD rising · 🟡 Stable &nbsp;|&nbsp; Real Rate = Interest Rate − Inflation
              </div>
            </div>
          </div>

          <div style={{ maxWidth:980, margin:"0 auto", padding:"24px 20px" }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(400px, 1fr))", gap:16 }}>
              {filtered.map(d => <PairCard key={d.pair} data={d} />)}
            </div>
            <div style={{ marginTop:20, background:"#fff", border:"1px solid #e5e7eb", borderRadius:10, padding:"12px 16px", fontSize:11, color:"#94a3b8", lineHeight:1.6 }}>
              <strong style={{ color:"#64748b" }}>ℹ️ Auto-refreshed biweekly via GitHub Actions + Claude.</strong> Rates are indicative mid-market prices — verify with your treasury desk before trading.
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
